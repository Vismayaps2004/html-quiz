<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="/public/styles/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Quiz</h1>
      </header>
      <section>
        <article>
          <fieldset>
            <legend>
              <h2>What is the capital of India</h2>
            </legend>
            <input type="radio" name="options" id="option-1" />
            <label for="option-1">New Delhi</label>
            <input type="radio" name="options" id="option-2" />
            <label for="option-2">Islamabad</label>
            <input type="radio" name="options" id="option-3" />
            <label for="option-3">Dhaka</label>
          </fieldset>
        </article>
      </section>
    </main>
  </body>
</html>
